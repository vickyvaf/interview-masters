<!doctype html>
<html lang="en">

<head>

  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Masters - Dashboard</title>
  <style>
    html,
    body,
    #root,
    .rt-Theme {
      margin: 0;
